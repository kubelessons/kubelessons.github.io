ckad1_labels_and_pods:
  text: |
    Create 3 Pods with names {{nginx1}}, {{nginx2}}, and {{nginx3}} in the namespace {{104ab4}} running {{nginx:latest}}. 
    - Label nginx1 with {{app=nginx}}. 
    - Annotate nginx2 with {{ingress=enabled}}. 
    - Completely unlabel the nginx3 Pod.

ckad1_nodes_and_taints:
  text: |
    You are a member of team-blue and must prepare a compute node designed only for team-blue deployments. 
    
    - Create the namespace {{team-blue}}.
    - Create a new minikube Node named {{blue}} and label it with {{node=dedicated}}. For minikube, you can use the command {{minikube node add blue}}. 
    - Add a taint to the {{blue}} node with {{node=dedicated}} and the {{NoSchedule}} effect. 
    - Create a Deployment named {{blue-dedicated-node}}, with the image {{nginx:latest}} in the namespace {{team-blue}}.
    - Ensure the Deployment:
      - Tolerates the taint on the node.
      - Is scheduled only on the node labeled {{node=dedicated}}.

ckad1_deployments_and_autoscaling:
  text: |
    Team Cr4zy has requested their application to be deployed in a namespace named {{team-cr4zy}}, which you must create. They use the image {{webapp-color:v1}} and require a Deployment named {{cr4zy-app}}. 
    The deployment should update its Pods using the {{Recreate}} strategy. Every Pod created by the deployment should request {{100m}} CPU.
    As the load on the application can vary drastically during the day, you suggest using horizontal autoscaling. 
    
    Configure the {{cr4zy-app}} Deployment with a horizontal autoscaler. Configure the autoscaler to deploy between 2-5 Pods, with a target CPU utilization of 75%.

ckad1_canary_and_loadbalancing:
  text: |
    A new version of a web application your company is hosting is available. You are tasked with verifying that the new version of the application can reliably serve traffic. 
    You will do this by creating a so-called *canary* Deployment. Using this method, the new version of the application is spun up and serves traffic next to the old version of the application.

    Create a Deployment called {{application}} with image {{hashicorp/http-echo:v0.2.2}}, and a Deployment called {{canary}} with image {{hashicorp/http-echo:v0.2.3}} both on a new namespace {{loadbalance}}. 
    Configure a Service that balances the load over the two Deployments. Configure the Deployments in such a way that 75% of the traffic reaches the stable version ({{hashicorp/http-echo:v0.2.2}}) 
    and 25% reaches the canary version ({{hashicorp/http-echo:v0.2.3}}) Deployment.

    **Optional**: you can verify your solution by adding the following configuration to your Deployments:

    ```yaml
        args: ["-text", "Hello from Pod $(POD_NAME)"]
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
    ```

    The image should then respond to API GET Requests with the Pod name that handled the request.

ckad1_cronjobs:
  text: |
    As a member of Team Slyce you are responsible for creating PostgreSQL database backups and cleaning up old log files. Team Slyce operates in the {{pg-slice}} namespace, that you must create. 
    Both the backup and cleanup Jobs must happen on a regular schedule. 
    The requirements of the two jobs are as follows:
    - A CronJob named {{db-backup}} must exist in the {{pg-slyce}} namespace. It should run the image {{postgres:15.17-trixie}} and schedule a Job every night at 02:00 AM.
    - The {{db-backup}} CronJob must not allow concurrent Jobs to run.
    - The {{db-backup}} CronJob should always keep the last 7 successful, and last 7 failed Jobs.

    - A CronJob named {{db-cleanup}} must exist in the {{pg-slyce}} namespace. It should also run the image {{postgres:15.17-trixie}}.
    - The {{db-cleanup}} CronJob must run once per week on Sunday at 05:00 AM.
    - The Jobs created by the {{db-cleanup}} CronJob should have a maximum of 3 retries upon failure. The container itself must never be allowed to Restart.

    Create both CronJobs according to the specifications mentioned above.

ckad1_restricted_namespace:
  text: |
    You received a message from a developer that Kyverno flagged a Pod in the {{acceptance}} namespace in another Kubernetes cluster for violating some of the security policies. 
    You do not have access to that Kubernetes cluster, but the developer does send you a log of Error messages:

    ```log
    error: resource was rejected by Kyverno: resource Pod/acceptance/insecure-pod failed policy strict-policy: 
    - runAsNonRoot: container c1 must not run as root (UID 0).
    - seccompProfile: container c1 must have a seccomp profile set to RuntimeDefault.
    - allowPrivilegeEscalation: container c1 must not allow privilege escalation.
    - readOnlyRootFilesystem: container c1 must have a read-only root filesystem.
    - capabilities: container c1 must drop ALL capabilities.
    ```

    Show the developer how to implement a Pod with the correct security context. Deploy a Pod to the {{acceptance}} namespace in your cluster that conforms to all the security policies that are mentioned above. 
    You can name the Pod {{dev-security-demo}}, and for demonstration purposes can use the image {{nginx:latest}}.

ckad1_serviceaccount_capture_the_flag:
  text: |
    You are investigating Kubernetes credentials inside Pods. You must create a workload and identify the token that this workload uses to talk to the kube-apiserver.

    - Create a namespace called {{ctf}}.
    - Create a ServiceAccount named {{inspector}} in the {{ctf}} namespace.
    - Create a Pod in the {{ctf}} namespace named {{app}} with
      - image: {{busybox:latest}}
      - command: {{sleep 3600}}
      - with service account: {{inspector}}
    - Identify the ServiceAccount JWT token mounted inside the Pod.
    - Save the value of the token inside the file {{~/token.txt}}.

ckad1_identify_deployment_issues:
  text: |
    You are contacted by a developer from team June-ior requesting help in troubleshooting their Deployment manifest. 
    Identify and fix all issues in the Deployment manifest and then apply it to your Kubernetes cluster on the {{june-ior}} namespace. You can create the namespace {{june-ior}} if it doesn't exist.
    You must ensure that all Pods reach a Running & Ready state. You cannot delete the initContainer, livenessProbe, or readinessProbes, but you can change them.

    ```yaml
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: web-app
      namespace: dev-team
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: web
      template:
        metadata:
          labels:
            app: nginx
        spec:
          containers:
          - name: web
            image: nginx:last
            ports:
            - containerPort: "8080"
      restartPolicy: Never
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 1
          maxSurge: 1
    ```

ckad1_daemonsets_tls_secrets_observability:
  text: |
    For this question create the namespace {{secure-logs}}.

    Create a DaemonSet with the following requirements:
    - Runs on all nodes.
    - uses the image {{nginx:1.25-alpine}}.
    - Mounts a Secret volume at {{/etc/tls}} named {{tls-volume}} inside the container.

    You must create a TLS secret in the {{secure-logs}} namespace with these requirements:
    - Secret name must be {{tls-secret}}.
    - Must be of type {{kubernetes.io/tls}}.
    - Contains {{tls.crt}} and {{tls.key}}.
    - You can generate a certificate and key with openssl:
      ```bash
        openssl req -x509 -nodes -days 365 \
          -newkey rsa:2048 \
          -keyout tls.key \
          -out tls.crt \
          -subj "/CN=localhost"
      ```

    You must mount the secret inside the container at {{/etc/tls}}, and files must be {{read-only}}. Ensure that the secret keys appear as files:
    - {{/etc/tls/tls.crt}}
    - {{/etc/tls/tls.key}}

ckad1_namespace_limits:
  text: |
    A new development team will deploy workloads into a dedicated Kubernetes namespace. To prevent resource overuse, the cluster administrators want to enforce strict resource boundaries.

    Create a namespace called {{limited}}. Create a ResourceQuota to enforce the below constraints on the {{limited}} namespace. You don't *need* to create any Pods.

    - Maximum number of Pods: 5
    - Maximum total CPU requests: 200m
    - Maximum total CPU limits: 300m
    - Maximum total Memory requests: 100Mi
    - Maximum total Memory limits: 150Mi

ckad1_readiness_liveness_tcp_probes:
  text: |
    A team is deploying a lightweight internal service that listens for TCP connections on port {{80}}. The application does not expose HTTP health endpoints, so health checks must be performed using TCP socket probes.

    The platform team wants to ensure:

    - The container is restarted if it becomes unresponsive.
    - The Pod only receives traffic when it is ready to accept TCP connections.

    Create a Pod in the {{default}} namespace with the name {{lightweight-app}}, the image {{nginx:alpine}}, container name {{app}}, and the container port {{80}}.

    Configure a TCP Liveness probe with an initial delay of {{10}} seconds, and a period of {{5}} seconds.
    Configure a TCP Readiness probe with an initial delay of {{2}} seconds, and a period of {{3}} seconds, and a failure threshold of {{1}}.

ckad1_network_policies:
  text: |
    The busy-team has been security audited and was told to implement network policies to better control traffic inside their kubernetes cluster.
    As they are very busy, this task was assigned to you. Their setup is as follows:

    - They run a PostgreSQL database (as Pods with label {{type=database}}) in the {{busy-database}} namespace.
    - They run two web-api's (as Deployments, with Pod labels {{app=green}} for the {{green}} web-api, and with Pod labels {{app=blue}} for the {{blue}} web-api) in the {{busy-api}} namespace. 


    As they are truly very busy, all the specifications you obtained are in a hastily scribbled note:
    - All ingress and egress traffic must be denied by default unless explicitly allowed via NetworkPolicies.
    - Egress traffic from the {{green}} to the {{blue}} web-api Pods over port {{80}} **ALLOWED**. 
    - Egress traffic from the {{green}} web-api Pods to the database over port {{5432}} **ALLOWED**.
    - Ingress traffic to the database from the {{green}} web-api Pods over port {{5432}} **ALLOWED**.
    - Ingress traffic to the database from the {{blue}} web-api Pods **NOT ALLOWED**. 

    Create the namespaces {{busy-database}} and {{busy-api}}. Label {{busy-database}} with {{namespace=busy-database}} and label {{busy-api}} with {{namespace=busy-api}}. 
    Create the network policies required to satisfy the above specifications. You do not need to deploy any databases or api's.

ckad1_ingress:
  text: |
    TODO: Ingress exercise

ckad1_helm:
  text: |
    *For this question, you are allowed to use the following url and sub-directories for information:* {{https://github.com/grafana-community/helm-charts/tree/main/charts/grafana}}.

    <br />

    Add the {{grafana-community}} Helm repository {{https://grafana-community.github.io/helm-charts}}.

    - Create the namespace {{grafana-dev}}.
    - Install Grafana using Helm, and give it the name {{grafana-dev}}. 
    - Configure the chart such that the service type is {{NodePort}}, and the admin password is set to {{swordfish17}}.

    After installation, upgrade the {{grafana-dev}} Helm chart such that the service type is now {{ClusterIP}}.

ckad1_docker:
  text: |
    Given the {{index.html}} file with the contents:
    ```html
    <!DOCTYPE html>
    <html>
    <head>
        <title>Hello CKAD</title>
    </head>
    </html>
    ```
    Create a Dockerfile and the above {{index.html}} file in the {{~/ckad1/q15/docker}} folder. The Dockerfile should use the {{nginx:latest}} image, 
    and should copy the {{index.html}} file to {{/usr/share/nginx/html/index.html}}.

    Build a Docker image from the Dockerfile you created, and give it the name {{dev-app}} and tag it with {{v0.0.1}}. 
    Save the image as a {{tar}} archive in the the directory {{~/ckad1/q15/image}} with the name {{dev-app.tar}}.

ckad1_roles_and_rolebindings:
  text: |
    A GitOps controller (e.g. FluxCD) will be run by the platform team in the {{iota}} namespace and must only be able to read Pods in that namespace. 
    The controller will use the service account named {{controller-sa}}. 
    
    Create the required ServiceAccount, Role, and RoleBinding on the {{iota}} namespace.

ckad1_set_env_from_configmap:
  text: |
    Create a ConfigMap named {{app-config}} in the {{default}} namespace containing the following key-value pairs:
    - APP_COLOR=blue
    - APP_MODE=test
    - APP_DEBUG=true

    Create a Deployment named {{configured-app}} in the {{default}} namespace running the image {{nginx:1.25}} and {{2}} replicas.

    Expose the ConfigMap values as environment variables inside the container.
    Additional requirement: 
    - The environment variable names inside the container must match the ConfigMap keys, but with the "APP_" prefix removed.
      (e.g., APP_COLOR → COLOR).


ckad1_linux_capabilities:
  text: |
    Create a Deployment named {{secure-app}} in the {{capabilities}} namespace, run it with {{nginx:latest}} for testing purposes.

    The application inside the container requires the ability to bind to privileged ports (<1024). Add the {{NET_BIND_SERVICE}} capability to the container, and no other capabilities.
